name: Build LongScreenshot

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build main app
        run: |
          set -e
          rm -rf build
          # Use BOTH: CONFIGURATION_BUILD_DIR for binary + derivedDataPath for intermediates
          xcodebuild clean build \
            -project LongScreenshot.xcodeproj \
            -scheme LongScreenshot \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath "$(pwd)/build/DD" \
            CONFIGURATION_BUILD_DIR="$PWD/build/Products" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            SWIFT_VERSION=5.5 \
            2>&1 | tee build.log

          echo "=== Build output ==="
          echo "Products dir:"
          ls -la build/Products/ 2>/dev/null || echo "(empty)"
          echo "App contents:"
          ls -la build/Products/LongScreenshot.app/ 2>/dev/null || echo "(not found)"
          echo "All binaries:"
          find build -name "LongScreenshot" -type f 2>/dev/null | head -10

      - name: Build Broadcast Extension
        run: |
          set -e
          brew install xcodegen
          xcodegen generate --spec broadcast-project.yml
          sed -i '' 's/objectVersion = [0-9]*;/objectVersion = 56;/' BroadcastExtension.xcodeproj/project.pbxproj

          xcodebuild clean build \
            -project BroadcastExtension.xcodeproj \
            -scheme BroadcastExtension \
            -sdk iphoneos \
            -configuration Release \
            CONFIGURATION_BUILD_DIR="$(pwd)/build/Extension" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            SWIFT_VERSION=5.0 \
            2>&1 | tee build-extension.log

          echo "=== Extension binary ==="
          file build/Extension/BroadcastExtension.appex/BroadcastExtension || echo "NOT FOUND"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            build-extension.log
          retention-days: 3

      - name: Create IPA
        run: |
          # Try CONFIGURATION_BUILD_DIR first, then fall back to DerivedData
          APP="build/Products/LongScreenshot.app"
          if [ ! -d "$APP" ]; then
            APP=$(find build -name "LongScreenshot.app" -type d | head -1)
          fi
          EXT="build/Extension/BroadcastExtension.appex"

          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "ERROR: .app not found"
            find build -type d | head -30
            exit 1
          fi
          echo "App: $APP"

          BIN="$APP/LongScreenshot"
          if [ ! -f "$BIN" ]; then
            echo "ERROR: main binary not found at $BIN"
            ls -la "$APP/"
            exit 1
          fi
          file "$BIN"

          # NOTE: Broadcast Extension not embedded for now
          # (Windows IPA extraction has path issues with extensions)
          # Extension source code is retained for future use

          # Sign binaries
          echo "=== Signing ==="
          brew install ldid 2>&1 | tail -1
          ldid -S "$BIN"

          # Package IPA
          mkdir -p Payload
          cp -R "$APP" Payload/
          ditto -c -k --keepParent Payload LongScreenshot.ipa
          rm -rf Payload
          echo "IPA: $(ls -lh LongScreenshot.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LongScreenshot.ipa
          path: LongScreenshot.ipa
          retention-days: 7
