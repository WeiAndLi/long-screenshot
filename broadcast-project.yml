name: BroadcastExtension
options:
  bundleIdPrefix: com.longscreenshot.app
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  BroadcastExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: BroadcastExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.longscreenshot.app.broadcast
        INFOPLIST_FILE: BroadcastExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: BroadcastExtension/BroadcastExtension.entitlements
    dependencies: []
